<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Página de Introdução</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;

            /* Imagem de fundo */
            background-image: url('https://via.placeholder.com/1200x800');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            text-align: center;
        }

        .conteudo {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 50px;
            margin: 100px auto;
            width: 60%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="conteudo">
        <h1>Bem-vindo ao Meu Site</h1>
        <p>
            Esta é uma página de introdução criada com HTML e CSS.
            Aqui você pode apresentar informações iniciais de forma
            simples e com um visual agradável utilizando uma imagem de fundo.
        </p>
    </div>

</body>
</html>
